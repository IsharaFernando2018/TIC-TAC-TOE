name: Build

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest  # ✅ Changed: Using GitHub-hosted runner to avoid Windows SSL issues
    steps:
      # Checkout repository
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones disabled for full history analysis

      # ✅ Added: Setup Java (SonarQube scanner requires Java)
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # Run SonarQube scan
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - name: npm install
        run: npm install
       # ✅ Install Trivy
      - name: Install Trivy
        run: |
          sudo apt update
          sudo apt install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt update
          sudo apt install -y trivy

      # ✅ Run Trivy scan
      - name: Trivy file scan
        run: trivy fs . > trivyfs.txt

      - name: Upload Trivy scan report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-report
          path: trivyfs.txt
          
      - name: Build and Tag Docker Image
        run: |
          docker build -t tic-tac-toe .
          docker tag tic-tac-toe ferdi2018/tic-tac-toe:latest
          docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}
          docker push ferdi2018/tic-tac-toe:latest
          
       
      - name: Trivy image scan
        run: trivy image ferdi2018/tic-tac-toe:latest > trivyimage.txt

      - name: Run the container
        run: docker run -d --name ticgame -p 3000:3000 sevenajay/tic-tac-toe:latest




